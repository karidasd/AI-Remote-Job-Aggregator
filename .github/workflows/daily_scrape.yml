name: Autonomous Daily Job Scraper

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ETL Pipeline (Fetch & Parse Jobs)
      run: |
        python main.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "karidasd"
        git config --global user.email "karidasd@github.com"
        git add data/jobs.db README.md
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-update: Daily jobs and Live README refreshed" && git push)
